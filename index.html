<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BagasJS</title>
	<!-- CSS only -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
	<!-- JavaScript Bundle with Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
	
	<script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
	<script type="module">
		import { createApp } from 'https://unpkg.com/petite-vue?module'

		function Application({ initialValue }){
			return {
				count : initialValue,
				get message() {
					const messages = [
						"I am a student",
						"I love programming",
						"Hello!",
						"This site is not done yet",
					];
					return messages[this.count % messages.length];
				},
				increment() {
					this.count++;
				},
				$template : "#counter-template"
			}
		}
		createApp({
			Application
		}).mount()
	</script>

</head>
<body>
	<section id="header">
		<nav class="navbar navbar-expand-lg bg-light">
			<div class="container">
				<a class="navbar-brand" href="#">BagasJS</a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNavAltMarkup">
					<div class="me-auto"></div>
					<div class="navbar-nav">
						<a class="nav-link active" aria-current="page" href="#">Home</a>
						<a class="nav-link" href="#">About Me</a>
						<a class="nav-link" href="#">Projects</a>
						<a class="nav-link" href="#">Blogs</a>
					</div>
				</div>
			</div>
		</nav>
	</section>
	<section id="content" class="container my-5">
		<h1>Hey, I am Bagas!</h1>
		<div v-scope = "Application({ initialValue : 0 })"></div>
		<template id="counter-template">
			<p class="row">
				<span class="col-md-5">
					{{ message }}
				</span>
				<span class="col-md-5 text-center">
					<button class="btn btn-outline-success" @click="increment">Who Am I</button>
				</span>
			</p>
		</template>
	</section>
</body>
</html>
